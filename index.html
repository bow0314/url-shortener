<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短網址轉換器 × reurl.cc</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Theme tokens ── */
[data-theme="dark"]{
  --bg:#0f0f13;--surface:#18181f;--surface2:#22222d;--surface3:#2a2a38;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --text:#e8e8f0;--muted:#8888a0;--text-inv:#0f0f13;
  --accent:#7c6ff0;--accent2:#a89cf5;
  --success:#4ade8a;--error:#f06060;
  --tip-bg:rgba(124,111,240,.08);--tip-border:rgba(124,111,240,.2);--tip-text:#c0baff;
  --toggle-track:#3a3a50;--toggle-thumb:#e8e8f0;
}
[data-theme="light"]{
  --bg:#f0f0f5;--surface:#ffffff;--surface2:#f5f5fa;--surface3:#ebebf5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1a1a2e;--muted:#7070a0;--text-inv:#ffffff;
  --accent:#6055d8;--accent2:#5048c8;
  --success:#1a9e55;--error:#cc3333;
  --tip-bg:rgba(96,85,216,.06);--tip-border:rgba(96,85,216,.18);--tip-text:#4a42a0;
  --toggle-track:#c8c8e0;--toggle-thumb:#1a1a2e;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;min-height:100vh;padding:40px 24px;transition:background .2s,color .2s;}
.wrap{max-width:860px;margin:0 auto;}

/* ── Header ── */
header{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.logo{width:42px;height:42px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
h1{font-size:22px;font-weight:600;letter-spacing:-.3px;color:var(--text);}
h1 span{display:block;font-size:13px;font-weight:400;color:var(--muted);margin-top:2px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

/* ── Theme toggle ── */
.theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border2);transition:.2s;user-select:none;}
.theme-toggle:hover{border-color:var(--accent);}
.theme-toggle .icon{font-size:14px;transition:.3s;}
.theme-label{font-size:12px;font-weight:600;color:var(--muted);}
.toggle-track{width:32px;height:18px;background:var(--toggle-track);border-radius:99px;position:relative;transition:.2s;}
.toggle-thumb{width:12px;height:12px;background:var(--toggle-thumb);border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s;}
[data-theme="light"] .toggle-thumb{left:17px;}
[data-theme="light"] .toggle-track{background:var(--accent);}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px;transition:background .2s,border-color .2s;}
.card-header{display:flex;align-items:center;gap:10px;}
.label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.card-header .label{flex:1;}

/* ── Collapse button ── */
.collapse-btn{
  display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;
  background:transparent;border:1px solid transparent;
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;
}
.collapse-btn:hover{color:var(--text);background:var(--surface2);border-color:var(--border2);}
.collapse-btn .arr{transition:transform .25s;display:inline-block;font-style:normal;}
.collapsed .arr{transform:rotate(-90deg);}
.collapsible{overflow:hidden;transition:max-height .3s ease,opacity .3s ease;max-height:600px;opacity:1;}
.collapsible.closed{max-height:0;opacity:0;pointer-events:none;}

/* ── API Key ── */
.api-row{display:flex;gap:10px;align-items:center;margin-top:14px;}
.api-row input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Courier New',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;}
.api-row input:focus{border-color:var(--accent);}
.api-row input::placeholder{color:var(--muted);letter-spacing:0;font-family:inherit;}
.api-link{font-size:12px;color:var(--accent2);text-decoration:none;white-space:nowrap;padding:10px 14px;border-radius:7px;background:var(--tip-bg);border:1px solid var(--tip-border);transition:.15s;}
.api-link:hover{opacity:.8;}
.tip{font-size:12px;color:var(--tip-text);margin-top:10px;padding:10px 14px;background:var(--tip-bg);border:1px solid var(--tip-border);border-radius:7px;line-height:1.7;}
.tip strong{color:var(--accent2);}
.tip a{
  color:var(--accent2);text-decoration:none;
  position:relative;display:inline-block;
  transition:color .2s;
}
.tip a::after{
  content:'';position:absolute;left:0;bottom:-1px;
  width:100%;height:1.5px;
  background:currentColor;
  transform:scaleX(0);transform-origin:left center;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.tip a:hover{color:#ffffff;}
[data-theme="light"] .tip a:hover{color:var(--accent);}
.tip a:hover::after{transform:scaleX(1);}

/* ── Step 2 header with buttons ── */
.step2-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;flex-wrap:wrap;row-gap:10px;}
.step2-header .label{flex:1;min-width:120px;padding-top:10px;}
.step2-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.step2-buttons{display:flex;align-items:center;gap:10px;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;}
#convertBtn{min-width:108px;}
#saveBtn{min-width:108px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){filter:brightness(1.12);}
.btn-primary:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.btn-success{background:rgba(74,222,138,.13);color:var(--success);border:1px solid rgba(74,222,138,.22);}
.btn-success:hover:not(:disabled){background:rgba(74,222,138,.22);}
.btn-success:disabled{opacity:.35;cursor:not-allowed;}
.btn-hidden{visibility:hidden;pointer-events:none;}
.counter{font-size:12px;color:var(--muted);white-space:nowrap;min-height:16px;}

.step2-buttons{display:flex;align-items:center;gap:10px;}
@media(max-width:600px){
  .wrap{padding:24px 16px;}
  header{margin-bottom:20px;}
  h1{font-size:18px;}
  h1 span{font-size:12px;}
  .card{padding:16px;}
  .step2-header{flex-direction:column;align-items:flex-start;}
  .step2-actions{width:100%;}
  .step2-buttons{width:100%;flex-direction:column;}
  #convertBtn,#saveBtn{width:100%;}
  .mode-switch{width:100%;display:flex;}
  .mode-opt{flex:1;justify-content:center;}
  .col-select-row{flex-direction:column;align-items:flex-start;}
  .rows-table th:nth-child(2),.rows-table td:nth-child(2){display:none;}
  .url-results-wrap th:nth-child(2),.url-results-wrap td:nth-child(2){display:none;}
}

/* ── Progress (legacy, unused) ── */

/* ── Drop zone ── */
.drop-zone{
  border:2px dashed rgba(124,111,240,.35);border-radius:12px;
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:all .2s;background:rgba(124,111,240,.04);position:relative;
}
[data-theme="light"] .drop-zone{background:rgba(96,85,216,.03);border-color:rgba(96,85,216,.25);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(124,111,240,.08);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:36px;margin-bottom:12px;display:block;}
.drop-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.drop-sub{font-size:13px;color:var(--muted);}
.drop-sub span{color:var(--accent2);}

/* ── File info ── */
.file-info{
  display:flex;flex-direction:column;margin-bottom:12px;
  background:rgba(74,222,138,.07);border:1px solid rgba(74,222,138,.18);border-radius:9px;
  overflow:hidden;
}
.file-info-row{display:flex;align-items:center;gap:12px;padding:12px 16px;}
.file-name{font-size:14px;font-weight:600;color:var(--success);}
.file-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.file-clear{margin-left:auto;cursor:pointer;background:none;border:none;color:var(--muted);font-size:18px;line-height:1;transition:.15s;}
.file-clear:hover{color:var(--error);}
.file-progress{height:3px;background:rgba(74,222,138,.15);display:none;transition:opacity .4s ease;}
.file-progress-bar{height:100%;background:var(--accent);transition:width .25s ease;width:0%;}

/* ── Col selectors ── */
.col-select-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.col-select-row label{font-size:12px;color:var(--muted);white-space:nowrap;}
.col-select-row select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 10px;outline:none;cursor:pointer;}
.col-select-row select:focus{border-color:var(--accent);}

/* ── Dynamic rows table ── */
.rows-table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rows-table{width:100%;border-collapse:collapse;font-size:12px;}
.rows-table th{background:var(--surface2);padding:8px 10px;text-align:left;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.rows-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-family:'Courier New',monospace;color:var(--text);vertical-align:middle;}
.rows-table tr:last-child td{border-bottom:none;}
.rows-table td.url-cell{color:var(--accent2);}
.rows-table td.short-cell{color:var(--success);}
.rows-table td.err-cell{color:var(--error);font-family:inherit;font-size:11px;}
.rows-table td.pending-cell{color:var(--muted);font-style:italic;font-family:inherit;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.dot-ok{background:var(--success);}
.dot-err{background:var(--error);}
.dot-wait{background:var(--muted);}
.dot-spin{border:1.5px solid var(--muted);border-top-color:var(--accent);border-radius:50%;display:inline-block;width:8px;height:8px;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px;}
/* ── Mode switch ── */
.mode-switch{display:inline-flex;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:3px;gap:3px;margin-bottom:16px;}
.mode-opt{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .18s;display:flex;align-items:center;gap:6px;}
.mode-opt:hover{color:var(--text);}
.mode-opt.active{background:var(--accent);color:#fff;}

/* ── URL textarea panel ── */
.url-textarea{width:100%;min-height:180px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:13px;line-height:1.7;padding:14px 16px;resize:vertical;outline:none;transition:border-color .2s;}
.url-textarea::placeholder{color:var(--muted);}
.url-textarea:focus{border-color:var(--accent);}
.url-hint{font-size:12px;color:var(--muted);margin-top:8px;}

/* ── URL results table ── */
.url-results-wrap{margin-top:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.url-results-wrap table{width:100%;border-collapse:collapse;font-size:12px;}
.url-results-wrap th{background:var(--surface2);padding:8px 10px;text-align:left;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.url-results-wrap td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.url-results-wrap tr:last-child td{border-bottom:none;}
/* ── Copy button ── */
.copy-btn{
  padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;background:var(--accent);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  transition:filter .15s, transform .15s, background .15s;white-space:nowrap;
  width:80px;
}
.copy-btn:hover{filter:brightness(1.15);}
.copy-btn:active{transform:scale(.96);}
.copy-btn.copied{background:var(--success);color:#0a2a18;}
.copy-btn .check-icon{
  display:inline-block;
  animation:checkPop .2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes checkPop{
  0%{transform:scale(0) rotate(-20deg);opacity:0;}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
@keyframes spin{to{transform:rotate(360deg);}}

</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<header>
  <div class="logo">🔗</div>
  <h1>短網址轉換器<span>拖入 Excel → 選欄位 → 轉換 → 儲存回 Excel</span></h1>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()" title="切換明暗模式">
      <span class="icon" id="themeIcon">🌙</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="theme-label" id="themeLabel">暗黑</span>
    </div>
  </div>
</header>

<!-- Step 1: API Key -->
<div class="card">
  <div class="card-header">
    <span class="label">Step 1 — reurl.cc API Key</span>
    <button class="collapse-btn" id="step1ColBtn" onclick="toggleStep1()">
      <span class="arr" id="step1Arr">▾</span> 收合
    </button>
  </div>
  <div class="collapsible" id="step1Body">
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="貼上你的 API Key" />
      <a href="https://reurl.cc/main/user/signin/tw" target="_blank" class="api-link">登入取得 →</a>
    </div>
    <div class="tip">
      <strong>如何取得？</strong>
      <a href="https://reurl.cc/main/user/signin/tw" target="_blank">reurl.cc</a> 免費註冊 → 登入 → 開發者頁面 → 複製 API Key。免費方案 <strong>100 次/天</strong>。
    </div>
  </div>
</div>

<!-- Step 2 -->
<div class="card">
  <div class="step2-header">
    <span class="label" id="step2Label">Step 2 — 拖入 Excel 檔案</span>
    <div class="step2-actions">
      <div class="step2-buttons">
        <button class="btn btn-success" id="saveBtn" onclick="saveExcel()" disabled>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 8l4 4 4-4M3 13h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          儲存 Excel
        </button>
        <button class="btn btn-primary" id="convertBtn" onclick="startConvert()" disabled>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8c0 3.314 2.686 6 6 6s6-2.686 6-6-2.686-6-6-6" stroke="white" stroke-width="1.8" stroke-linecap="round"/><path d="M5 2L2 5l3 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          執行轉換
        </button>
      </div>
      <span class="counter" id="counter"></span>
    </div>
  </div>

  <!-- Mode switch -->
  <div class="mode-switch">
    <button class="mode-opt" id="modeUrl" onclick="switchMode('url')">📝 輸入網址</button>
    <button class="mode-opt active" id="modeExcel" onclick="switchMode('excel')">📊 拖曳 Excel</button>
  </div>

  <!-- URL input panel -->
  <div id="urlPanel" style="display:none">
    <textarea class="url-textarea" id="urlTextarea" placeholder="每行貼上一個完整網址，例如：&#10;https://www.youtube.com/watch?v=xxxxxxxxxx&#10;https://www.google.com/maps/place/...&#10;https://example.com/very/long/path?query=value"></textarea>
    <div class="url-hint">每行一個網址，需包含 https:// 或 http://</div>
    <div id="urlResultsArea"></div>
  </div>

  <!-- Excel panel -->
  <div id="excelPanel">
    <div id="dropArea">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
        <span class="drop-icon">📊</span>
        <div class="drop-title">拖曳 Excel 檔案到這裡</div>
        <div class="drop-sub">或點擊選擇檔案 &nbsp;·&nbsp; <span>支援 .xlsx / .xls / .csv</span></div>
      </div>
    </div>
    <div id="dataArea" style="display:none">
      <div class="file-info" id="fileInfo"></div>
      <div class="col-select-row" id="colSelectRow"></div>
      <div class="rows-table-wrap">
        <table class="rows-table" id="rowsTable">
          <thead id="rowsHead"></thead>
          <tbody id="rowsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
<script>
/* ── Mode switch ── */
let currentMode='excel';
function switchMode(mode){
  currentMode=mode;
  document.getElementById('modeUrl').classList.toggle('active',mode==='url');
  document.getElementById('modeExcel').classList.toggle('active',mode==='excel');
  document.getElementById('urlPanel').style.display=mode==='url'?'block':'none';
  document.getElementById('excelPanel').style.display=mode==='excel'?'block':'none';
  document.getElementById('step2Label').textContent=mode==='url'?'Step 2 — 輸入網址清單':'Step 2 — 拖入 Excel 檔案';
  // save btn: url mode shows export, excel mode keeps as is
  document.getElementById('saveBtn').classList.toggle('btn-hidden', mode==='url');
  // convert btn always enabled in url mode
  if(mode==='url') document.getElementById('convertBtn').disabled=false;
  else document.getElementById('convertBtn').disabled=!wb;
  document.getElementById('counter').textContent='';
}

/* ── Theme ── */
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeIcon').textContent=isDark?'☀️':'🌙';
  document.getElementById('themeLabel').textContent=isDark?'明亮':'暗黑';
}

/* ── Step 1 collapse ── */
let step1Open=true;
function toggleStep1(){
  step1Open=!step1Open;
  const body=document.getElementById('step1Body');
  const btn=document.getElementById('step1ColBtn');
  const arr=document.getElementById('step1Arr');
  body.classList.toggle('closed',!step1Open);
  arr.textContent=step1Open?'▾':'▸';
  btn.innerHTML=`<span class="arr" id="step1Arr">${step1Open?'▾':'▸'}</span> ${step1Open?'收合':'展開'}`;
}

/* ── State ── */
let wb=null,wsName='',jsonData=[],headers=[],urlColIdx=-1,shortColName='短網址';
let originalFileName='output';

/* ── Drop zone ── */
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(file){
  originalFileName=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    wb=XLSX.read(e.target.result,{type:'array'});
    wsName=wb.SheetNames[0];
    jsonData=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:''});
    if(!jsonData.length){alert('此檔案沒有資料列');return;}
    headers=Object.keys(jsonData[0]);
    // ensure shortColName doesn't collide
    shortColName='短網址';
    if(headers.includes(shortColName)) shortColName='短網址_reurl';

    // auto-detect URL column
    urlColIdx=0;
    for(let i=0;i<headers.length;i++){
      const s=String(jsonData[0][headers[i]]||'');
      if(s.startsWith('http://')||s.startsWith('https://')){urlColIdx=i;break;}
    }

    // show data area
    document.getElementById('dropArea').style.display='none';
    document.getElementById('dataArea').style.display='block';
    document.getElementById('convertBtn').disabled=false;

    renderFileInfo(file);
    renderColSelect();
    renderAllRows();
  };
  reader.readAsArrayBuffer(file);
}

function renderFileInfo(file){
  document.getElementById('fileInfo').innerHTML=`
    <div class="file-info-row">
      <span style="font-size:20px">📄</span>
      <div>
        <div class="file-name">${esc(file.name)}</div>
        <div class="file-meta">${jsonData.length} 列 · ${headers.length} 欄 · 工作表：${esc(wsName)}</div>
      </div>
      <button class="file-clear" onclick="clearFile()" title="重新選擇">✕</button>
    </div>
    <div class="file-progress" id="progressWrap">
      <div class="file-progress-bar" id="progressBar"></div>
    </div>`;
}

function renderColSelect(){
  const scOptions=['[新增欄位] 短網址',...headers].map((h,i)=>`<option value="${i}">${esc(h)}</option>`).join('');
  document.getElementById('colSelectRow').innerHTML=`
    <label>網址欄位：</label>
    <select id="colSelect" onchange="onColChange()">${headers.map((h,i)=>`<option value="${i}" ${i===urlColIdx?'selected':''}>${esc(h)}</option>`).join('')}</select>
    <label>短網址寫入：</label>
    <select id="shortColSelect" onchange="onShortColChange()">${scOptions}</select>`;
}

function onColChange(){
  urlColIdx=parseInt(document.getElementById('colSelect').value);
  renderAllRows();
}
function onShortColChange(){
  const v=parseInt(document.getElementById('shortColSelect').value);
  shortColName=v===0?'短網址':headers[v-1];
  if(shortColName==='短網址'&&headers.includes('短網址')) shortColName='短網址_reurl';
  renderAllRows();
}

/* ── Render all rows dynamically (no fixed height) ── */
function renderAllRows(){
  const urlCol=headers[urlColIdx];
  // visible columns: url col + up to 2 other cols + short col
  const others=headers.filter((_,i)=>i!==urlColIdx).slice(0,2);
  const visCols=[...others,urlCol];

  // header
  let thead='<tr>';
  thead+=`<th style="width:40px">#</th>`;
  others.forEach(h=>thead+=`<th>${esc(h)}</th>`);
  thead+=`<th style="color:var(--accent2)">${esc(urlCol)}</th>`;
  thead+=`<th style="color:var(--success)">${esc(shortColName)}</th>`;
  thead+=`<th style="width:60px">狀態</th></tr>`;
  document.getElementById('rowsHead').innerHTML=thead;

  // body
  let tbody='';
  jsonData.forEach((row,i)=>{
    const urlVal=String(row[urlCol]||'');
    const shortVal=String(row[shortColName]||'');
    const isUrl=urlVal.startsWith('http');
    let statusCell='<span class="dot-wait status-dot"></span>等待';
    if(shortVal&&!shortVal.startsWith('ERROR')) statusCell=`<span class="dot-ok status-dot"></span>完成`;
    else if(shortVal.startsWith('ERROR')) statusCell=`<span class="dot-err status-dot"></span>失敗`;

    tbody+=`<tr id="row-${i}">`;
    tbody+=`<td style="color:var(--muted);width:40px">${i+1}</td>`;
    others.forEach(h=>tbody+=`<td>${trunc(esc(String(row[h]||'')),30)}</td>`);
    tbody+=`<td class="url-cell">${trunc(esc(urlVal),50)}</td>`;

    if(shortVal.startsWith('ERROR'))
      tbody+=`<td class="err-cell">${esc(shortVal)}</td>`;
    else if(shortVal)
      tbody+=`<td class="short-cell">${esc(shortVal)}</td>`;
    else if(!isUrl)
      tbody+=`<td class="pending-cell">—</td>`;
    else
      tbody+=`<td class="pending-cell" id="short-${i}">（待轉換）</td>`;

    tbody+=`<td style="font-size:11px;color:var(--muted)" id="status-${i}">${statusCell}</td>`;
    tbody+=`</tr>`;
  });
  document.getElementById('rowsBody').innerHTML=tbody;
}

/* ── Update single row in-place ── */
function updateRow(i, shortVal, state){
  const shortCell=document.getElementById(`short-${i}`);
  const statusCell=document.getElementById(`status-${i}`);
  if(shortCell){
    if(state==='converting'){
      shortCell.innerHTML='<span class="dot-spin"></span>';
      shortCell.className='pending-cell';
    } else if(state==='ok'){
      shortCell.textContent=shortVal;
      shortCell.className='short-cell';
      shortCell.removeAttribute('id');
    } else {
      shortCell.textContent=shortVal;
      shortCell.className='err-cell';
      shortCell.removeAttribute('id');
    }
  }
  if(statusCell){
    if(state==='converting') statusCell.innerHTML='<span class="dot-spin"></span>轉換中';
    else if(state==='ok') statusCell.innerHTML='<span class="dot-ok status-dot"></span>完成';
    else statusCell.innerHTML='<span class="dot-err status-dot"></span>失敗';
  }
}

/* ── Convert ── */
async function startConvert(){
  const apiKey=document.getElementById('apiKey').value.trim();
  if(!apiKey){alert('請先填入 API Key');return;}
  if(currentMode==='url') return startConvertUrl(apiKey);
  return startConvertExcel(apiKey);
}

async function startConvertUrl(apiKey){
  const raw=document.getElementById('urlTextarea').value.trim();
  if(!raw){alert('請輸入至少一個網址');return;}
  const urls=raw.split('\n').map(u=>u.trim()).filter(Boolean);

  const btn=document.getElementById('convertBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="dot-spin"></span> 轉換中…';

  // build results table
  const area=document.getElementById('urlResultsArea');
  area.innerHTML=`<div class="url-results-wrap"><table>
    <thead><tr><th style="width:36px">#</th><th>原始網址</th><th>短網址</th><th style="width:60px">狀態</th><th style="width:52px"></th></tr></thead>
    <tbody id="urlResultsBody">${urls.map((u,i)=>`<tr id="ur-${i}">
      <td style="color:var(--muted)">${i+1}</td>
      <td style="font-family:'Courier New',monospace;color:var(--accent2)">${trunc(esc(u),60)}</td>
      <td id="urs-${i}" style="color:var(--muted);font-style:italic;font-family:'Courier New',monospace">（待轉換）</td>
      <td id="urst-${i}" style="font-size:11px;color:var(--muted)"><span class="dot-wait status-dot"></span>等待</td>
      <td id="urcp-${i}"></td>
    </tr>`).join('')}</tbody>
  </table></div>`;

  let ok=0,fail=0;
  for(let i=0;i<urls.length;i++){
    const url=urls[i];
    document.getElementById(`urst-${i}`).innerHTML='<span class="dot-spin"></span>轉換中';
    document.getElementById(`urs-${i}`).innerHTML='<span class="dot-spin"></span>';
    let result;
    try{
      const res=await fetch('https://api.reurl.cc/shorten',{
        method:'POST',
        headers:{'Content-Type':'application/json','reurl-api-key':apiKey},
        body:JSON.stringify({url})
      });
      const data=await res.json();
      result=data.short_url?{ok:true,short:data.short_url}:{ok:false,short:`ERROR: ${data.message||data.error||res.status}`};
    }catch(e){result={ok:false,short:`ERROR: ${e.message}`};}
    const sc=document.getElementById(`urs-${i}`);
    const st=document.getElementById(`urst-${i}`);
    if(result.ok){
      sc.textContent=result.short;sc.style.color='var(--success)';sc.style.fontStyle='normal';
      st.innerHTML='<span class="dot-ok status-dot"></span>完成';
      const cpCell=document.getElementById(`urcp-${i}`);
      if(cpCell){
        const copyBtn=document.createElement('button');
        copyBtn.className='copy-btn';
        copyBtn.textContent='複製';
        copyBtn.addEventListener('click',()=>{
          navigator.clipboard.writeText(result.short).then(()=>{
            copyBtn.classList.add('copied');
            copyBtn.innerHTML=`<span class="check-icon">✓</span> 已複製`;
            setTimeout(()=>{
              copyBtn.classList.remove('copied');
              copyBtn.textContent='複製';
            },1000);
          });
        });
        cpCell.appendChild(copyBtn);
      }
      ok++;
    }else{
      sc.textContent=result.short;sc.style.color='var(--error)';sc.style.fontStyle='normal';sc.style.fontFamily='inherit';sc.style.fontSize='11px';
      st.innerHTML='<span class="dot-err status-dot"></span>失敗';
      fail++;
    }
    document.getElementById('counter').textContent=`${ok} 成功 / ${fail} 失敗`;
    if(i<urls.length-1)await sleep(300);
  }
  btn.disabled=false;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8c0 3.314 2.686 6 6 6s6-2.686 6-6-2.686-6-6-6" stroke="white" stroke-width="1.8" stroke-linecap="round"/><path d="M5 2L2 5l3 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> 執行轉換`;
  document.getElementById('counter').textContent=`完成：${ok} 成功 / ${fail} 失敗`;
}

async function startConvertExcel(apiKey){
  const urlCol=headers[urlColIdx];
  const btn=document.getElementById('convertBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="dot-spin"></span> 轉換中…';
  document.getElementById('saveBtn').disabled=true;

  const pw=document.getElementById('progressWrap');
  const pb=document.getElementById('progressBar');
  pw.style.display='block';
  pb.style.width='0%';

  let ok=0,fail=0,skip=0;
  for(let i=0;i<jsonData.length;i++){
    const url=String(jsonData[i][urlCol]||'').trim();
    if(!url.startsWith('http')){skip++;pb.style.width=((i+1)/jsonData.length*100)+'%';continue;}
    updateRow(i,'','converting');
    let result;
    try{
      const res=await fetch('https://api.reurl.cc/shorten',{
        method:'POST',
        headers:{'Content-Type':'application/json','reurl-api-key':apiKey},
        body:JSON.stringify({url})
      });
      const data=await res.json();
      result=data.short_url?{ok:true,short:data.short_url}:{ok:false,short:`ERROR: ${data.message||data.error||res.status}`};
    }catch(e){result={ok:false,short:`ERROR: ${e.message}`};}
    jsonData[i][shortColName]=result.short;
    updateRow(i,result.short,result.ok?'ok':'error');
    if(result.ok)ok++;else fail++;
    pb.style.width=((i+1)/jsonData.length*100)+'%';
    document.getElementById('counter').textContent=`${ok} 成功 / ${fail} 失敗`;
    if(i<jsonData.length-1)await sleep(300);
  }
  btn.disabled=false;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8c0 3.314 2.686 6 6 6s6-2.686 6-6-2.686-6-6-6" stroke="white" stroke-width="1.8" stroke-linecap="round"/><path d="M5 2L2 5l3 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> 執行轉換`;
  document.getElementById('counter').textContent=`完成：${ok} 成功 / ${fail} 失敗${skip?` / ${skip} 略過`:''}`;
  document.getElementById('saveBtn').disabled=false;
  const pw2=document.getElementById('progressWrap');
  if(pw2){pw2.style.opacity='0';setTimeout(()=>{pw2.style.display='none';pw2.style.opacity='1';},420);}
}

/* ── Save ── */
function saveExcel(){
  if(!wb||!jsonData.length)return;
  const allHeaders=[...headers];
  if(!allHeaders.includes(shortColName))allHeaders.push(shortColName);
  const ws=XLSX.utils.json_to_sheet(jsonData,{header:allHeaders});
  ws['!cols']=allHeaders.map(h=>{
    const w=h===shortColName?30:Math.min(60,Math.max(h.length,...jsonData.map(r=>String(r[h]||'').length)))+2;
    return{wch:w};
  });
  wb.Sheets[wsName]=ws;
  const base=originalFileName.replace(/\.(xlsx|xls|csv)$/i,'');
  XLSX.writeFile(wb,`${base}_短網址.xlsx`);
}

/* ── Clear ── */
function clearFile(){
  wb=null;wsName='';jsonData=[];headers=[];
  document.getElementById('dropArea').style.display='block';
  document.getElementById('dataArea').style.display='none';
  document.getElementById('convertBtn').disabled=true;
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('counter').textContent='';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('progressBar').style.width='0%';
  fileInput.value='';
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
</script>
